<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- ring of coder threads + shared dongles -->
  <g transform="translate(300,300)">
    <!-- connection ring -->
    <circle r="170" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="6 8"/>

    <!-- dongles (between coders, pentagon offset 36°) -->
    <g font-family="Menlo, monospace" font-size="20" text-anchor="middle">
      <g transform="rotate(36) translate(0,-170) rotate(-36)">
        <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#fbbf24" opacity="0.85"/><text y="7" fill="#1a1a2e" font-weight="bold">D0</text>
      </g>
      <g transform="rotate(108) translate(0,-170) rotate(-108)">
        <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#fbbf24" opacity="0.85"/><text y="7" fill="#1a1a2e" font-weight="bold">D1</text>
      </g>
      <g transform="rotate(180) translate(0,-170) rotate(-180)">
        <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#475569"/><text y="7" fill="#cbd5e1" font-weight="bold">D2</text>
      </g>
      <g transform="rotate(252) translate(0,-170) rotate(-252)">
        <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#fbbf24" opacity="0.85"/><text y="7" fill="#1a1a2e" font-weight="bold">D3</text>
      </g>
      <g transform="rotate(324) translate(0,-170) rotate(-324)">
        <rect x="-26" y="-16" width="52" height="32" rx="6" fill="#475569"/><text y="7" fill="#cbd5e1" font-weight="bold">D4</text>
      </g>
    </g>

    <!-- coders (pentagon points) -->
    <g font-family="Menlo, monospace" font-size="22" text-anchor="middle">
      <g transform="translate(0,-170)">
        <circle r="38" fill="#22c55e" opacity="0.25"/><circle r="38" fill="none" stroke="#4ade80" stroke-width="2.5"/><text y="8" fill="#86efac">C0</text>
      </g>
      <g transform="rotate(72) translate(0,-170) rotate(-72)">
        <circle r="38" fill="#22c55e" opacity="0.25"/><circle r="38" fill="none" stroke="#4ade80" stroke-width="2.5"/><text y="8" fill="#86efac">C1</text>
      </g>
      <g transform="rotate(144) translate(0,-170) rotate(-144)">
        <circle r="38" fill="#334155" opacity="0.6"/><circle r="38" fill="none" stroke="#64748b" stroke-width="2"/><text y="8" fill="#94a3b8">C2</text>
      </g>
      <g transform="rotate(216) translate(0,-170) rotate(-216)">
        <circle r="38" fill="#7f1d1d" opacity="0.5"/><circle r="38" fill="none" stroke="#f87171" stroke-width="2.5"/><text y="8" fill="#fca5a5">C3</text>
      </g>
      <g transform="rotate(288) translate(0,-170) rotate(-288)">
        <circle r="38" fill="#334155" opacity="0.6"/><circle r="38" fill="none" stroke="#64748b" stroke-width="2"/><text y="8" fill="#94a3b8">C4</text>
      </g>
    </g>
  </g>

  <!-- legend -->
  <g font-family="Menlo, monospace" font-size="20">
    <circle cx="640" cy="96" r="10" fill="#4ade80"/><text x="662" y="103" fill="#9ca3af">compiling</text>
    <circle cx="640" cy="136" r="10" fill="#64748b"/><text x="662" y="143" fill="#9ca3af">waiting</text>
    <circle cx="640" cy="176" r="10" fill="#f87171"/><text x="662" y="183" fill="#9ca3af">deadline near</text>
    <rect x="630" y="206" width="20" height="14" rx="3" fill="#fbbf24"/><text x="662" y="220" fill="#9ca3af">dongle held</text>
  </g>

  <!-- thread timeline (gantt) -->
  <g transform="translate(630,280)">
    <text x="0" y="-16" font-family="Menlo, monospace" font-size="20" fill="#9ca3af">thread timeline — edf scheduler</text>
    <g font-family="Menlo, monospace" font-size="18" fill="#64748b">
      <text x="-8" y="28" text-anchor="end">C0</text>
      <rect x="0" y="10" width="120" height="26" rx="4" fill="#4ade80" opacity="0.8"/>
      <rect x="124" y="10" width="70" height="26" rx="4" fill="#38bdf8" opacity="0.55"/>
      <rect x="198" y="10" width="120" height="26" rx="4" fill="#4ade80" opacity="0.8"/>
      <rect x="322" y="10" width="90" height="26" rx="4" fill="#334155"/>

      <text x="-8" y="74" text-anchor="end">C1</text>
      <rect x="0" y="56" width="80" height="26" rx="4" fill="#334155"/>
      <rect x="84" y="56" width="120" height="26" rx="4" fill="#4ade80" opacity="0.8"/>
      <rect x="208" y="56" width="70" height="26" rx="4" fill="#38bdf8" opacity="0.55"/>
      <rect x="282" y="56" width="130" height="26" rx="4" fill="#4ade80" opacity="0.8"/>

      <text x="-8" y="120" text-anchor="end">C2</text>
      <rect x="0" y="102" width="150" height="26" rx="4" fill="#334155"/>
      <rect x="154" y="102" width="120" height="26" rx="4" fill="#4ade80" opacity="0.8"/>
      <rect x="278" y="102" width="134" height="26" rx="4" fill="#334155"/>

      <text x="-8" y="166" text-anchor="end">C3</text>
      <rect x="0" y="148" width="200" height="26" rx="4" fill="#334155"/>
      <rect x="204" y="148" width="100" height="26" rx="4" fill="#f87171" opacity="0.7"/>
      <rect x="308" y="148" width="104" height="26" rx="4" fill="#4ade80" opacity="0.8"/>
    </g>
  </g>

  <!-- terminal log -->
  <rect x="630" y="470" width="500" height="80" rx="10" fill="#0b1120" stroke="#1e3a5f" stroke-width="2"/>
  <g font-family="Menlo, monospace" font-size="19">
    <text x="652" y="502"><tspan fill="#64748b">[842ms]</tspan><tspan fill="#e5e7eb"> coder 3 has taken dongle 2</tspan></text>
    <text x="652" y="534"><tspan fill="#64748b">[850ms]</tspan><tspan fill="#86efac"> coder 3 is compiling</tspan></text>
  </g>
</svg>
